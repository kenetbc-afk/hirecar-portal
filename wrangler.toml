name = "hirecar-portal"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "hirecar-db"
database_id = "ada3c40f-a4d9-4b3c-9b40-dde656f6f099"

[[kv_namespaces]]
binding = "PIFR_ENROLLMENTS"
id = "63f10e99a7fa4584aeb397168fe052c5"

# ── R2 Bucket (document + ID storage) ──
# Bucket created 2026-04-28 after R2 was enabled on the account.
# upload.js binds via env.DOCS_BUCKET (member ID front/back, dispute docs).
[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "hirecar-documents"
